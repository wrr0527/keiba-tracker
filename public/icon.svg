<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#f7e99a"/>
      <stop offset="40%"  stop-color="#e8c86a"/>
      <stop offset="100%" stop-color="#b8881a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Deep navy background -->
  <rect width="512" height="512" rx="96" fill="#0d1a35"/>
  <!-- Subtle inner vignette -->
  <rect width="512" height="512" rx="96" fill="url(#vignette)" opacity="0.3"/>
  <!-- Horseshoe: two legs + arc, drawn as a thick stroked path -->
  <path
    d="M 154,82 L 154,278 A 102,102 0 0 1 358,278 L 358,82"
    fill="none"
    stroke="url(#gold)"
    stroke-width="54"
    stroke-linecap="butt"
    filter="url(#glow)"
  />
  <!-- Nail holes (6 total, punched through with bg color) -->
  <circle cx="154" cy="130" r="11" fill="#0d1a35"/>
  <circle cx="154" cy="210" r="11" fill="#0d1a35"/>
  <circle cx="177" cy="332" r="11" fill="#0d1a35"/>
  <circle cx="256" cy="368" r="11" fill="#0d1a35"/>
  <circle cx="335" cy="332" r="11" fill="#0d1a35"/>
  <circle cx="358" cy="210" r="11" fill="#0d1a35"/>
  <circle cx="358" cy="130" r="11" fill="#0d1a35"/>
</svg>
